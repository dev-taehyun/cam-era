<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>CamEra</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0; padding: 0;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      overscroll-behavior: none;
      touch-action: none; 
    }

    /* ── Viewfinder ── */
    #viewfinder {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      background: #000;
    }

    #canvas { display: none; }

    /* ── Permission Screen ── */
    #permission-screen {
      position: fixed; inset: 0;
      background: #000;
      display: none; 
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 90;
    }
    .perm-icon {
      width: 72px; height: 72px;
      border-radius: 18px;
      background: rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px;
    }
    .perm-title {
      color: #fff; font-size: 20px; font-weight: 600;
      letter-spacing: -0.3px; margin-bottom: 10px;
    }
    .perm-desc {
      color: rgba(255,255,255,0.45); font-size: 14px;
      text-align: center; line-height: 1.55;
      padding: 0 40px; margin-bottom: 36px;
      white-space: pre-line;
    }
    #open-camera-btn {
      background: #fff; color: #000; border: none;
      border-radius: 14px; font-size: 16px; font-weight: 600;
      letter-spacing: -0.2px; padding: 15px 48px;
      cursor: pointer; transition: opacity 0.15s;
    }
    #open-camera-btn:active { opacity: 0.75; }

    /* ── Top Bar ── */
    #top-bar {
      position: fixed; top: 0; left: 0; right: 0;
      height: 60px;
      padding-top: env(safe-area-inset-top, 0px);
      display: none;
      align-items: flex-end; justify-content: center;
      z-index: 30; padding-bottom: 8px;
      pointer-events: none;
    }

    /* ── Zoom indicator ── */
    #zoom-indicator {
      position: fixed;
      bottom: 178px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.52);
      backdrop-filter: blur(16px) saturate(1.4);
      -webkit-backdrop-filter: blur(16px) saturate(1.4);
      border-radius: 100px;
      padding: 6px 16px;
      color: #FFD60A;
      font-size: 15px; font-weight: 600; letter-spacing: 0.01em;
      z-index: 25; pointer-events: none;
      opacity: 0; transition: opacity 0.3s ease;
      white-space: nowrap;
    }
    #zoom-indicator.visible { opacity: 1; }

    /* ── Bottom Bar ── */
    #bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 0 32px calc(env(safe-area-inset-bottom, 0px) + 32px);
      display: none;
      flex-direction: column; align-items: center;
      z-index: 30;
      background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 100%);
      pointer-events: none;
    }

    /* Save row */
    #save-row {
      display: flex; align-items: center; gap: 5.4px;
      margin-bottom: 10px;
      pointer-events: all;
    }
    #save-label {
      color: rgba(255,255,255,0.75);
      font-size: 13px; font-weight: 500; letter-spacing: 0.01em;
    }
    #save-toggle {
      position: relative; width: 46px; height: 28px;
      cursor: pointer; pointer-events: all;
    }
    #save-toggle input {
      opacity: 0; width: 0; height: 0; position: absolute;
    }
    .t-track {
      position: absolute; inset: 0; border-radius: 100px;
      background: rgba(255,255,255,0.18);
      transition: background 0.22s ease;
    }
    #save-toggle input:checked + .t-track { background: #34C759; }
    .t-thumb {
      position: absolute; top: 3px; left: 3px;
      width: 22px; height: 22px; border-radius: 50%;
      background: #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    #save-toggle input:checked ~ .t-thumb { transform: translateX(18px); }

    /* Control row */
    #control-row {
      width: 100%; display: flex;
      align-items: center; justify-content: space-between;
      pointer-events: none;
    }

    /* Thumbnail */
    #thumbnail-slot {
      width: 52px; height: 52px; border-radius: 10px;
      border: 2.5px solid rgba(255,255,255,0.65);
      overflow: hidden; background: rgba(255,255,255,0.06);
      cursor: pointer; pointer-events: all;
      flex-shrink: 0; transition: opacity 0.15s;
    }
    #thumbnail-slot:active { opacity: 0.7; }
    #thumbnail-slot img {
      width: 100%; height: 100%; object-fit: cover; display: none;
    }

    /* Shutter */
    #shutter {
      width: 76px; height: 76px; border-radius: 50%;
      background: transparent;
      border: 3.5px solid rgba(255,255,255,0.9);
      cursor: pointer; position: relative; flex-shrink: 0;
      transition: transform 0.1s ease;
      pointer-events: all;
    }
    #shutter::after {
      content: ''; position: absolute; inset: 6px;
      border-radius: 50%; background: rgba(255,255,255,0.95);
      transition: transform 0.1s ease, opacity 0.1s ease;
    }
    #shutter:active { transform: scale(0.91); }
    #shutter:active::after { transform: scale(0.86); opacity: 0.8; }

    /* Flip */
    #flip-btn {
      width: 52px; height: 52px; border-radius: 50%;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      pointer-events: all; flex-shrink: 0;
      transition: background 0.15s, transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    #flip-btn:active { background: rgba(255,255,255,0.22); }
    #flip-btn.spinning { transform: rotate(180deg); }

    /* ── Gallery viewer ── */
    #gallery-viewer {
      position: fixed; inset: 0; background: #000;
      z-index: 100; display: none;
      touch-action: none;
    }
    
    #viewer-header {
      position: absolute; top: 0; left: 0; right: 0;
      height: 72px;
      padding-top: env(safe-area-inset-top, 0px);
      background: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent);
      z-index: 110;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    #viewer-header.ui-hidden {
      opacity: 0; pointer-events: none; transform: translateY(-10px);
    }
    
    .header-inner {
      position: relative;
      width: 100%; height: 100%;
      display: flex;
      align-items: flex-end;
      padding-bottom: 12px;
    }
    
    .viewer-btn {
      width: 36px; height: 36px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border-radius: 50%; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.15s;
    }
    .viewer-btn:active { opacity: 0.6; }
    
    #viewer-left-controls {
      position: absolute; left: 20px; bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 112;
    }
    
    .header-title-center {
      position: absolute;
      left: 50%; bottom: 18px; 
      transform: translateX(-50%);
      color: #fff; font-size: 15px; font-weight: 600;
      letter-spacing: -0.2px; text-shadow: 0 1px 4px rgba(0,0,0,0.6);
      text-align: center;
      z-index: 111;
      pointer-events: none;
      white-space: nowrap;
      line-height: 1;
    }
    
    #viewer-right-controls {
      position: absolute; right: 20px; bottom: 12px;
      display: flex;
      align-items: center;
      gap: 14px;
      z-index: 112;
    }

    #viewer-select-toggle {
      background: #007AFF;
      border-radius: 100px;
      padding: 0 14px;
      height: 24px;
      line-height: 24px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      align-self: flex-end;
      margin-bottom: 6px;
    }
    #viewer-select-toggle.active {
      background: rgba(255,255,255,0.12);
    }

    /* ── 갤러리 미디어 바둑판 그리드 컨테이너 ── */
    #gallery-grid-layer {
      position: absolute; inset: 0;
      top: calc(72px + env(safe-area-inset-top, 0px));
      bottom: env(safe-area-inset-bottom, 0px);
      padding: 4px 2px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-auto-rows: calc((100vw - 10px) / 4);
      gap: 2px;
      background: #000;
      z-index: 101;
      touch-action: pan-y;
    }
    #gallery-grid-layer.select-mode-active {
      bottom: calc(76px + env(safe-area-inset-bottom, 0px));
    }

    .grid-item {
      position: relative;
      width: 100%;
      height: 100%;
      background: #090909;
      overflow: hidden;
    }
    .grid-item:active {
      opacity: 0.75;
    }
    .grid-item img {
      width: 100%; height: 100%;
      object-fit: cover;
      pointer-events: none;
      transition: transform 0.2s ease;
    }
    
    .grid-item .select-overlay {
      position: absolute; inset: 0;
      background: rgba(0, 0, 0, 0.35);
      opacity: 0; pointer-events: none;
      transition: opacity 0.15s ease;
      display: flex; align-items: flex-end; justify-content: right;
      padding: 6px;
      z-index: 5;
    }
    .grid-item .select-badge {
      width: 18px; height: 18px; border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.6);
      background: rgba(0,0,0,0.2);
      display: flex; align-items: center; justify-content: center;
    }
    .grid-item .select-badge svg { display: none; }

    .grid-item.selected img {
      transform: scale(0.92);
    }
    .grid-item.selected .select-overlay {
      opacity: 1;
    }
    .grid-item.selected .select-badge {
      background: #007AFF; border-color: #007AFF;
    }
    .grid-item.selected .select-badge svg {
      display: block;
    }

    /* ── 다중 선택용 하단 툴바 컨테이너 ── */
    #gallery-bulk-toolbar {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: calc(76px + env(safe-area-inset-bottom, 0px));
      padding: 12px 24px calc(env(safe-area-inset-bottom, 0px) + 12px);
      background: rgba(20,20,20,0.94);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 0.5px solid rgba(255,255,255,0.1);
      display: none;
      align-items: center; justify-content: space-between;
      z-index: 115;
    }
    .bulk-btn {
      flex: 1; height: 44px; border-radius: 12px;
      font-size: 14px; font-weight: 600; border: none;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: opacity 0.15s;
    }
    .bulk-btn:active { opacity: 0.7; }
    #bulk-download { background: rgba(255,255,255,0.12); color: #fff; margin-right: 12px; }
    #bulk-delete { background: rgba(255, 59, 48, 0.2); color: #FF453A; }

    /* ── 상세 인스펙터 슬라이더 컨테이너 래퍼 ── */
    #gallery-detail-layer {
      position: absolute; inset: 0;
      background: #000;
      z-index: 102;
      display: none;
      touch-action: pan-x;
    }

    #swipe-container {
      display: flex; width: 100%; height: 100%; will-change: transform;
    }
    .swipe-slide {
      min-width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .swipe-slide img {
      max-width: 100%; max-height: 100%;
      object-fit: contain; pointer-events: none; display: block;
      transform-origin: center center;
      transition: transform 0.1s ease-out;
    }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 120px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(30,30,30,0.85);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      color: #fff; padding: 11px 22px; border-radius: 100px;
      font-size: 13px; font-weight: 500; letter-spacing: 0.01em;
      z-index: 200; opacity: 0; pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <video id="viewfinder" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <div id="permission-screen">
    <div class="perm-icon">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
    </div>
    <div class="perm-title">카메라 접근</div>
    <div class="perm-desc">사진을 촬영하려면 카메라 접근 권한이 필요합니다.</div>
    <button id="open-camera-btn">카메라 열기</button>
  </div>

  <div id="top-bar"></div>
  <div id="zoom-indicator">1.0×</div>

  <div id="bottom-bar">
    <div id="save-row">
      <span id="save-label">사진 저장</span>
      <label id="save-toggle" for="save-cb">
        <input type="checkbox" id="save-cb">
        <span class="t-track"></span>
        <span class="t-thumb"></span>
      </label>
    </div>
    <div id="control-row">
      <div id="thumbnail-slot"><img id="thumbnail" alt=""></div>
      <button id="shutter" aria-label="촬영"></button>
      <button id="flip-btn" aria-label="카메라 전환">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 4v6h6"/><path d="M23 20v-6h-6"/>
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10"/>
          <path d="M3.51 15a9 9 0 0 0 14.85 3.36L23 14"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="gallery-viewer">
    <div id="viewer-header">
      <div class="header-inner">
        <div id="viewer-left-controls">
          <button class="viewer-btn" id="viewer-close" aria-label="닫기">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
          <button class="viewer-btn" id="viewer-grid" aria-label="전체 보기" style="display: none;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7"></rect>
              <rect x="14" y="3" width="7" height="7"></rect>
              <rect x="14" y="14" width="7" height="7"></rect>
              <rect x="3" y="14" width="7" height="7"></rect>
            </svg>
          </button>
        </div>
        
        <div id="viewer-counter" class="header-title-center">모든 사진</div>
        
        <div id="viewer-right-controls">
          <button id="viewer-select-toggle">선택</button>
          <button class="viewer-btn" id="viewer-delete" aria-label="삭제" style="background: rgba(255, 59, 48, 0.35);">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#FF453A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
          </button>
          <button class="viewer-btn" id="viewer-download" aria-label="다운로드">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
    
    <div id="gallery-grid-layer"></div>
    
    <div id="gallery-bulk-toolbar">
      <button class="bulk-btn" id="bulk-download">선택 다운로드</button>
      <button class="bulk-btn" id="bulk-delete">선택 삭제</button>
    </div>

    <div id="gallery-detail-layer">
      <div id="swipe-container"></div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    'use strict';

    // ── DOM Elements ──
    const DOM = {
      viewfinder: document.getElementById('viewfinder'),
      canvas: document.getElementById('canvas'),
      permScreen: document.getElementById('permission-screen'),
      openBtn: document.getElementById('open-camera-btn'),
      permDesc: document.querySelector('.perm-desc'),
      topBar: document.getElementById('top-bar'),
      bottomBar: document.getElementById('bottom-bar'),
      shutter: document.getElementById('shutter'),
      flipBtn: document.getElementById('flip-btn'),
      thumbnailSlot: document.getElementById('thumbnail-slot'),
      thumbnailImg: document.getElementById('thumbnail'),
      saveCheckbox: document.getElementById('save-cb'),
      galleryViewer: document.getElementById('gallery-viewer'),
      galleryGridLayer: document.getElementById('gallery-grid-layer'),
      galleryDetailLayer: document.getElementById('gallery-detail-layer'),
      swipeContainer: document.getElementById('swipe-container'),
      viewerClose: document.getElementById('viewer-close'),
      viewerGrid: document.getElementById('viewer-grid'),
      viewerSelectToggle: document.getElementById('viewer-select-toggle'),
      viewerDelete: document.getElementById('viewer-delete'),
      viewerDownload: document.getElementById('viewer-download'),
      viewerCounter: document.getElementById('viewer-counter'),
      viewerHeader: document.getElementById('viewer-header'),
      galleryBulkToolbar: document.getElementById('gallery-bulk-toolbar'),
      bulkDownload: document.getElementById('bulk-download'),
      bulkDelete: document.getElementById('bulk-delete'),
      toast: document.getElementById('toast'),
      zoomIndicator: document.getElementById('zoom-indicator')
    };

    // ── App State ──
    const state = {
      currentStream: null,
      facingMode: 'environment',
      photosArray: [], 
      currentSlideIndex: 0,
      toastTimer: null,
      lastTap: 0,
      galleryViewMode: 'grid', 
      isSelectMode: false,
      selectedPhotoIds: new Set(),
      draggedPhotoIds: new Set(),
      isDraggingSelect: false,

      // Camera Zoom Settings
      zoom: {
        track: null,
        current: 1.0,
        min: 1.0,
        max: 1.0,
        isSupported: false,
        hideTimer: null
      },

      // Gestures (Camera Viewfinder)
      cameraGesture: {
        isPinchActive: false,
        startDist: 0,
        startZoom: 1.0
      },

      // Gestures (Gallery Common Swipe & Pan)
      galleryGesture: {
        swX: 0,
        swY: 0, 
        swT: 0,
        isSwiveLive: false,
        zoom: 1.0,
        startZoom: 1.0,
        panX: 0,
        panY: 0,
        startPanX: 0,
        startPanY: 0,
        isPinchActive: false,
        startDist: 0,
        pinchCenterX: 0,
        pinchCenterY: 0
      }
    };

    // ── IndexedDB 설정 및 초기화 ──
    const DB_NAME = 'CamEraDB';
    const DB_VERSION = 2; 
    const STORE_NAME = 'photos';
    let db = null;

    function initDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);

        request.onupgradeneeded = (e) => {
          const database = e.target.result;
          if (database.objectStoreNames.contains(STORE_NAME)) {
            database.deleteObjectStore(STORE_NAME);
          }
          database.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
        };

        request.onsuccess = (e) => {
          db = e.target.result;
          resolve(db);
        };

        request.onerror = (e) => {
          console.error('IndexedDB 가동 실패:', e.target.error);
          reject(e.target.error);
        };
      });
    }

    function loadPhotosFromDB() {
      return new Promise((resolve) => {
        if (!db) return resolve([]);
        const transaction = db.transaction([STORE_NAME], 'readonly');
        const store = transaction.objectStore(STORE_NAME);
        const request = store.getAll();

        request.onsuccess = (e) => {
          const records = e.target.result || [];
          const mappedPhotos = records.map(item => ({
            id: item.id,
            blob: item.blob,
            objectUrl: URL.createObjectURL(item.blob), 
            timestamp: item.timestamp
          }));
          resolve(mappedPhotos);
        };
        request.onerror = () => resolve([]);
      });
    }

    function savePhotoToDB(blob) {
      return new Promise((resolve) => {
        if (!db) return resolve(null);
        const transaction = db.transaction([STORE_NAME], 'readwrite');
        const store = transaction.objectStore(STORE_NAME);
        const item = { blob: blob, timestamp: Date.now() };
        let request;
        
        try {
          request = store.add(item);
        } catch (err) {
          console.error('DB 저장 처리 실패:', err);
          return resolve(null);
        }

        request.onsuccess = (e) => {
          item.id = e.target.result;
          item.objectUrl = URL.createObjectURL(blob);
          resolve(item);
        };
        request.onerror = (e) => {
          console.error('DB 할당량 부족 또는 쓰기 제한 오류:', e.target.error);
          resolve(null);
        };
      });
    }

    function deletePhotoFromDB(id) {
      return new Promise((resolve) => {
        if (!db) return resolve(false);
        const transaction = db.transaction([STORE_NAME], 'readwrite');
        const store = transaction.objectStore(STORE_NAME);
        const request = store.delete(id);

        request.onsuccess = () => resolve(true);
        request.onerror = () => resolve(false);
      });
    }

    // ── Utility Functions ──
    const pad = (n) => String(n).padStart(2, '0');
    
    const getTimestamp = () => {
      const d = new Date();
      return `${d.getFullYear()}${pad(d.getMonth() + 1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}_${String(d.getMilliseconds()).padStart(3, '0')}`;
    };

    const getTouchDist = (touches) => {
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      return Math.hypot(dx, dy);
    };

    // ── System Event Blockers ──
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('selectstart', e => e.preventDefault());
    document.addEventListener('dragstart', e => e.preventDefault());

    document.addEventListener('touchend', e => {
      const now = Date.now();
      if (now - state.lastTap < 280) {
        if (state.galleryViewMode !== 'grid' || !state.isSelectMode) {
          e.preventDefault();
        }
      }
      state.lastTap = now;
    }, { passive: false });

    document.addEventListener('touchstart', e => {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });

    document.addEventListener('touchmove', e => {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });

    // ── Camera Core Functions ──
    async function startCamera(facing, isSilent = false) {
      if (!navigator.mediaDevices?.getUserMedia) {
        showPermScreen('이 브라우저는 카메라를 지원하지 않습니다.');
        return;
      }

      if (state.currentStream) { 
        state.currentStream.getTracks().forEach(t => {
          try { t.stop(); } catch (_) {}
        }); 
        state.currentStream = null; 
      }
      
      state.facingMode = facing;
      
      const constraintsQueue = [
        { facingMode: facing, width: { ideal: 4096 }, height: { ideal: 2160 }, frameRate: { ideal: 30 } },
        { facingMode: facing, width: { ideal: 1920 }, height: { ideal: 1080 } },
        { facingMode: facing }
      ];

      let stream = null;
      let captureError = null;

      for (const constraints of constraintsQueue) {
        try {
          stream = await navigator.mediaDevices.getUserMedia({ audio: false, video: constraints });
          if (stream) break;
        } catch (err) {
          captureError = err;
        }
      }

      if (stream) {
        state.currentStream = stream;
        DOM.viewfinder.srcObject = stream;
        state.zoom.track = stream.getVideoTracks()[0];
        initZoom();
        
        DOM.permScreen.style.display = 'none';
        DOM.topBar.style.display     = 'flex';
        DOM.bottomBar.style.display  = 'flex';
      } else {
        if (isSilent) {
          showPermScreen();
          return;
        }
        if (captureError && (captureError.name === 'NotAllowedError' || captureError.name === 'PermissionDeniedError')) {
          showPermScreen('카메라 권한이 거부되었습니다.\n브라우저 설정에서 카메라 접근을 허용해 주세요.');
        } else {
          handleCameraError(captureError || new Error('Stream 획득 실패'));
        }
      }
    }

    function checkAndResumeCamera() {
      if (DOM.galleryViewer.style.display === 'block') return;
      if (DOM.permScreen.style.display !== 'none') return;
      
      const track = state.currentStream?.getVideoTracks()[0];
      if (!track || track.readyState === 'ended' || DOM.viewfinder.paused) {
        startCamera(state.facingMode, false);
      }
    }

    // ── Camera Viewfinder Zoom Controls ──
    function initZoom() {
      state.zoom.isSupported = false;
      state.zoom.current = 1.0; 
      state.zoom.min = 1.0; 
      state.zoom.max = 1.0;
      
      if (!state.zoom.track?.getCapabilities) return;
      
      const caps = state.zoom.track.getCapabilities();
      if (caps.zoom?.min != null && caps.zoom?.max != null) {
        state.zoom.min = caps.zoom.min;
        state.zoom.max = caps.zoom.max;
        state.zoom.current = caps.zoom.min; 
        state.zoom.isSupported = true;
      }
    }

    document.addEventListener('touchstart', e => {
      if (e.touches.length === 2 && state.zoom.isSupported && DOM.galleryViewer.style.display !== 'block') {
        state.cameraGesture.isPinchActive = true;
        state.cameraGesture.startDist     = getTouchDist(e.touches);
        state.cameraGesture.startZoom     = state.zoom.current;
      }
    }, { passive: false });

    document.addEventListener('touchmove', e => {
      if (!state.cameraGesture.isPinchActive || e.touches.length !== 2) return;
      
      const dist    = getTouchDist(e.touches);
      const ratio   = dist / state.cameraGesture.startDist;
      const newZoom = Math.max(state.zoom.min, Math.min(state.zoom.max, state.cameraGesture.startZoom * ratio));
      
      if (Math.abs(newZoom - state.zoom.current) >= 0.05) {
        state.zoom.current = newZoom;
        applyZoom(newZoom);
      }
    }, { passive: false });

    document.addEventListener('touchend', e => {
      if (e.touches.length < 2) state.cameraGesture.isPinchActive = false;
    }, { passive: true });

    async function applyZoom(level) {
      if (!state.zoom.track?.applyConstraints) return;
      try { 
        await state.zoom.track.applyConstraints({ advanced: [{ zoom: level }] }); 
      } catch (_) {}
      showZoomLabel(level);
    }

    function showZoomLabel(level) {
      DOM.zoomIndicator.textContent = `${level.toFixed(1)}×`;
      DOM.zoomIndicator.classList.add('visible');
      clearTimeout(state.zoom.hideTimer);
      state.zoom.hideTimer = setTimeout(() => DOM.zoomIndicator.classList.remove('visible'), 1200);
    }

    // ── Capture & Shutter ──
    DOM.shutter.addEventListener('click', () => {
      if (!state.currentStream) return;
      
      const vw = DOM.viewfinder.videoWidth;
      const vh = DOM.viewfinder.videoHeight;
      if (!vw || !vh) return;
      
      DOM.canvas.width = vw; 
      DOM.canvas.height = vh;
      
      const ctx = DOM.canvas.getContext('2d');
      if (state.facingMode === 'user') { 
        ctx.translate(vw, 0); 
        ctx.scale(-1, 1); 
      }
      
      ctx.drawImage(DOM.viewfinder, 0, 0, vw, vh);
      
      DOM.canvas.toBlob(async (blob) => {
        if (!blob) return;

        const savedItem = await savePhotoToDB(blob);
        let photoObject = null;

        if (savedItem) {
          photoObject = savedItem;
          state.photosArray.push(photoObject);
        } else {
          const fallbackUrl = URL.createObjectURL(blob);
          photoObject = { id: 'temp_' + Date.now(), blob: blob, objectUrl: fallbackUrl, timestamp: Date.now() };
          state.photosArray.push(photoObject);
          showToast('⚠️ 저장 공간 부족으로 임시 상태로만 유지됩니다.', 3000);
        }
        
        DOM.thumbnailImg.src = photoObject.objectUrl;
        DOM.thumbnailImg.style.display = 'block';
        
        if (DOM.saveCheckbox.checked) {
          saveImage(photoObject, false);
        }
      }, 'image/jpeg', 1.0);
    });

    // ── Save Process ──
    function saveImage(photoItem, toastObj = true) {
      if (!photoItem) return;

      const a = document.createElement('a');
      a.href = photoItem.objectUrl; 
      
      const uniqueSuffix = (typeof photoItem.id === 'number') ? photoItem.id : Math.floor(Math.random() * 1000);
      a.download = `photo_${getTimestamp()}_${uniqueSuffix}.jpg`;
      
      document.body.appendChild(a); 
      a.click(); 
      document.body.removeChild(a);
      
      if (toastObj) showToast('저장되었습니다');
      setTimeout(checkAndResumeCamera, 300);
    }

    // ── Camera Flip ──
    DOM.flipBtn.addEventListener('click', () => {
      DOM.flipBtn.classList.add('spinning');
      setTimeout(() => DOM.flipBtn.classList.remove('spinning'), 350);
      startCamera(state.facingMode === 'environment' ? 'user' : 'environment', false);
    });

    // ── Custom Gallery Viewer & Swipe Slider ──
    DOM.thumbnailSlot.addEventListener('click', () => {
      if (!state.photosArray.length) return;
      exitSelectMode(); 
      openGalleryDetailView(state.photosArray.length - 1);
    });

    function openGalleryGridView() {
      state.galleryViewMode = 'grid';
      DOM.galleryViewer.style.display = 'block';
      DOM.galleryGridLayer.style.display = 'grid';
      DOM.galleryDetailLayer.style.display = 'none';
      
      DOM.viewerCounter.textContent = '모든 사진';
      DOM.viewerGrid.style.display = 'none'; 
      DOM.viewerSelectToggle.style.display = 'block'; 
      DOM.viewerDelete.style.display = 'none'; 
      DOM.viewerDownload.style.display = 'none';

      renderGridItems();
    }

    function renderGridItems() {
      DOM.galleryGridLayer.innerHTML = '';
      
      for (let i = state.photosArray.length - 1; i >= 0; i--) {
        const item = state.photosArray[i];
        const gridItem = document.createElement('div');
        gridItem.className = 'grid-item';
        gridItem.setAttribute('data-id', item.id);
        if (state.isSelectMode && state.selectedPhotoIds.has(item.id)) {
          gridItem.classList.add('selected');
        }
        
        const img = document.createElement('img');
        img.src = item.objectUrl;
        img.loading = 'lazy';
        
        const overlay = document.createElement('div');
        overlay.className = 'select-overlay';
        const badge = document.createElement('div');
        badge.className = 'select-badge';
        badge.innerHTML = `
          <svg width="10" height="8" viewBox="0 0 12 10" fill="none">
            <path d="M1 5L4.5 8.5L11 1" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        `;
        overlay.appendChild(badge);
        
        gridItem.appendChild(img);
        gridItem.appendChild(overlay);
        DOM.galleryGridLayer.appendChild(gridItem);
        
        gridItem.addEventListener('click', () => {
          if (state.isSelectMode) {
            toggleSelectPhoto(item.id, gridItem);
          } else {
            openGalleryDetailView(i);
          }
        });
      }
    }

    function getGridItemFromCoords(x, y) {
      const element = document.elementFromPoint(x, y);
      if (!element) return null;
      return element.closest('.grid-item');
    }

    // 드래그 트랙킹 이벤트를 그리드 레이어 내부로 응집화
    DOM.galleryGridLayer.addEventListener('mousedown', (e) => {
      if (!state.isSelectMode) return;
      state.isDraggingSelect = false;
      state.draggedPhotoIds.clear();
      
      const item = getGridItemFromCoords(e.clientX, e.clientY);
      if (item) {
        const id = item.getAttribute('data-id');
        const parsedId = isNaN(id) ? id : Number(id);
        state.draggedPhotoIds.add(parsedId);
      }
    });

    DOM.galleryGridLayer.addEventListener('mousemove', (e) => {
      if (!state.isSelectMode) return;
      if (e.buttons !== 1) return; 
      
      state.isDraggingSelect = true;
      const item = getGridItemFromCoords(e.clientX, e.clientY);
      if (item) {
        const id = item.getAttribute('data-id');
        const parsedId = isNaN(id) ? id : Number(id);
        if (!state.draggedPhotoIds.has(parsedId)) {
          state.draggedPhotoIds.add(parsedId);
          toggleSelectPhoto(parsedId, item);
        }
      }
    });

    DOM.galleryGridLayer.addEventListener('mouseup', () => {
      if (state.isDraggingSelect) {
        setTimeout(() => { state.isDraggingSelect = false; }, 50);
      }
    });

    DOM.galleryGridLayer.addEventListener('touchstart', (e) => {
      if (!state.isSelectMode) return;
      state.isDraggingSelect = false;
      state.draggedPhotoIds.clear();
      
      const touch = e.touches[0];
      const item = getGridItemFromCoords(touch.clientX, touch.clientY);
      if (item) {
        const id = item.getAttribute('data-id');
        const parsedId = isNaN(id) ? id : Number(id);
        state.draggedPhotoIds.add(parsedId);
      }
    }, { passive: true });

    DOM.galleryGridLayer.addEventListener('touchmove', (e) => {
      if (!state.isSelectMode) return;
      
      state.isDraggingSelect = true;
      const touch = e.touches[0];
      const item = getGridItemFromCoords(touch.clientX, touch.clientY);
      if (item) {
        const id = item.getAttribute('data-id');
        const parsedId = isNaN(id) ? id : Number(id);
        if (!state.draggedPhotoIds.has(parsedId)) {
          state.draggedPhotoIds.add(parsedId);
          toggleSelectPhoto(parsedId, item);
        }
      }
    }, { passive: true });

    DOM.galleryGridLayer.addEventListener('touchend', () => {
      if (state.isDraggingSelect) {
        setTimeout(() => { state.isDraggingSelect = false; }, 50);
      }
    }, { passive: true });

    function toggleSelectPhoto(id, element) {
      if (state.selectedPhotoIds.has(id)) {
        state.selectedPhotoIds.delete(id);
        element.classList.remove('selected');
      } else {
        state.selectedPhotoIds.add(id);
        element.classList.add('selected');
      }
      updateBulkToolbarUI();
    }

    function updateBulkToolbarUI() {
      const count = state.selectedPhotoIds.size;
      if (count > 0) {
        DOM.bulkDownload.textContent = `${count}장 다운로드`;
        DOM.bulkDelete.textContent = `${count}장 삭제`;
        DOM.bulkDownload.disabled = false;
        DOM.bulkDelete.disabled = false;
        DOM.bulkDownload.style.opacity = '1';
        DOM.bulkDelete.style.opacity = '1';
      } else {
        DOM.bulkDownload.textContent = `선택 다운로드`;
        DOM.bulkDelete.textContent = `선택 삭제`;
        DOM.bulkDownload.disabled = true;
        DOM.bulkDelete.disabled = true;
        DOM.bulkDownload.style.opacity = '0.4';
        DOM.bulkDelete.style.opacity = '0.4';
      }
    }

    DOM.viewerSelectToggle.addEventListener('click', () => {
      if (state.isSelectMode) {
        exitSelectMode();
      } else {
        enterSelectMode();
      }
    });

    function enterSelectMode() {
      state.isSelectMode = true;
      state.selectedPhotoIds.clear();
      DOM.viewerSelectToggle.textContent = '취소';
      DOM.viewerSelectToggle.classList.add('active');
      DOM.galleryGridLayer.classList.add('select-mode-active');
      DOM.galleryBulkToolbar.style.display = 'flex';
      updateBulkToolbarUI();
      renderGridItems();
    }

    function exitSelectMode() {
      state.isSelectMode = false;
      state.selectedPhotoIds.clear();
      DOM.viewerSelectToggle.textContent = '선택';
      DOM.viewerSelectToggle.classList.remove('active');
      DOM.galleryGridLayer.classList.remove('select-mode-active');
      DOM.galleryBulkToolbar.style.display = 'none';
      renderGridItems();
    }

    // ── 다중 일괄 실행 액션 로직 ──
    DOM.bulkDownload.addEventListener('click', () => {
      if (state.selectedPhotoIds.size === 0) return;
      
      let targetItems = state.photosArray.filter(p => state.selectedPhotoIds.has(p.id));
      
      targetItems.forEach((item, idx) => {
        setTimeout(() => {
          saveImage(item, false);
          if (idx === targetItems.length - 1) {
            showToast(`${targetItems.length}장의 사진이 저장되었습니다.`);
            exitSelectMode();
          }
        }, idx * 250);
      });
    });

    DOM.bulkDelete.addEventListener('click', async () => {
      if (state.selectedPhotoIds.size === 0) return;
      
      const targetIds = new Set(state.selectedPhotoIds);
      const deletePromises = [];
      
      state.photosArray.forEach(item => {
        if (targetIds.has(item.id)) {
          if (typeof item.id === 'number') {
            deletePromises.push(deletePhotoFromDB(item.id));
          }
          if (item.objectUrl) {
            URL.revokeObjectURL(item.objectUrl);
          }
        }
      });
      
      await Promise.all(deletePromises);
      state.photosArray = state.photosArray.filter(p => !targetIds.has(p.id));
      
      if (state.photosArray.length === 0) {
        DOM.thumbnailImg.src = '';
        DOM.thumbnailImg.style.display = 'none';
        DOM.galleryViewer.style.display = 'none';
        exitSelectMode();
        setTimeout(checkAndResumeCamera, 100);
      } else {
        const latestPhoto = state.photosArray[state.photosArray.length - 1];
        DOM.thumbnailImg.src = latestPhoto.objectUrl;
        showToast('선택한 사진들이 삭제되었습니다');
        exitSelectMode();
      }
    });

    function openGalleryDetailView(index) {
      state.galleryViewMode = 'detail';
      state.currentSlideIndex = index;
      
      DOM.galleryGridLayer.style.display = 'none';
      DOM.galleryDetailLayer.style.display = 'block';
      
      DOM.viewerGrid.style.display = 'flex'; 
      DOM.viewerSelectToggle.style.display = 'none'; 
      DOM.viewerDelete.style.display = 'flex'; 
      DOM.viewerDownload.style.display = 'flex';

      renderGalleryItems();
    }

    function renderGalleryItems() {
      DOM.swipeContainer.innerHTML = '';
      state.photosArray.forEach(item => {
        const slide = document.createElement('div'); 
        slide.className = 'swipe-slide';
        const img = document.createElement('img'); 
        img.src = item.objectUrl;
        slide.appendChild(img); 
        DOM.swipeContainer.appendChild(slide);
      });
      
      if (state.currentSlideIndex >= state.photosArray.length) {
        state.currentSlideIndex = state.photosArray.length - 1;
      }
      if (state.currentSlideIndex < 0) state.currentSlideIndex = 0;

      DOM.galleryViewer.style.display = 'block';
      DOM.viewerHeader.classList.remove('ui-hidden'); 
      resetSlideZoom(); 
      setTimeout(() => moveSlide(false), 30);
    }

    DOM.viewerHeader.addEventListener('touchstart', (e) => e.stopPropagation(), { passive: true });
    DOM.viewerHeader.addEventListener('touchend', (e) => e.stopPropagation(), { passive: true });

    DOM.viewerClose.addEventListener('click', () => {
      if (DOM.viewerHeader.classList.contains('ui-hidden')) return;
      exitSelectMode();
      DOM.galleryViewer.style.display = 'none';
      setTimeout(checkAndResumeCamera, 100);
    });

    DOM.viewerGrid.addEventListener('click', () => {
      if (DOM.viewerHeader.classList.contains('ui-hidden')) return;
      openGalleryGridView();
    });

    DOM.viewerDownload.addEventListener('click', () => {
      if (DOM.viewerHeader.classList.contains('ui-hidden')) return;
      const currentItem = state.photosArray[state.currentSlideIndex];
      if (currentItem) {
        saveImage(currentItem, true);
      }
    });

    DOM.viewerDelete.addEventListener('click', async () => {
      if (DOM.viewerHeader.classList.contains('ui-hidden')) return;
      if (!state.photosArray.length) return;

      const targetItem = state.photosArray[state.currentSlideIndex];
      if (!targetItem) return;

      if (typeof targetItem.id === 'number') {
        await deletePhotoFromDB(targetItem.id);
      }

      if (targetItem.objectUrl) {
        URL.revokeObjectURL(targetItem.objectUrl);
      }

      state.photosArray.splice(state.currentSlideIndex, 1);

      if (state.photosArray.length === 0) {
        DOM.thumbnailImg.src = '';
        DOM.thumbnailImg.style.display = 'none';
        DOM.galleryViewer.style.display = 'none';
        setTimeout(checkAndResumeCamera, 100);
      } else {
        if (state.currentSlideIndex >= state.photosArray.length) {
          state.currentSlideIndex = state.photosArray.length - 1;
        }
        
        const latestPhoto = state.photosArray[state.photosArray.length - 1];
        DOM.thumbnailImg.src = latestPhoto.objectUrl;
        
        renderGalleryItems();
        showToast('삭제되었습니다');
      }
    });

    function moveSlide(anim = true) {
      if (!state.photosArray.length) return;
      DOM.swipeContainer.style.transition = anim ? 'transform 0.3s cubic-bezier(0.16,1,0.3,1)' : 'none';
      DOM.swipeContainer.style.transform  = `translateX(${-state.currentSlideIndex * window.innerWidth}px)`;
      
      DOM.viewerCounter.textContent = `${state.currentSlideIndex + 1} / ${state.photosArray.length}`;
    }

    function resetSlideZoom() {
      state.galleryGesture.zoom = 1.0;
      state.galleryGesture.panX = 0;
      state.galleryGesture.panY = 0;
      const imgs = DOM.swipeContainer.querySelectorAll('.swipe-slide img');
      imgs.forEach(img => {
        img.style.transform = 'translate(0px, 0px) scale(1)';
      });
    }

    function updateCurrentImageTransform() {
      const currentImg = DOM.swipeContainer.children[state.currentSlideIndex]?.querySelector('img');
      if (currentImg) {
        currentImg.style.transform = `translate(${state.galleryGesture.panX}px, ${state.galleryGesture.panY}px) scale(${state.galleryGesture.zoom})`;
      }
    }

    // ── Gallery Gesture Handlers ──
    function onGalleryTouchStart(e) {
      if (state.galleryViewMode === 'grid') return;

      const g = state.galleryGesture;
      if (e.touches.length === 2) {
        g.isSwiveLive = false;
        g.isPinchActive = true;
        g.startDist = getTouchDist(e.touches);
        g.startZoom = g.zoom;

        g.pinchCenterX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        g.pinchCenterY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
        
        g.startPanX = g.panX;
        g.startPanY = g.panY;
      } else if (e.touches.length === 1) { 
        g.swX = e.touches[0].clientX; 
        g.swY = e.touches[0].clientY; 
        g.startPanX = g.panX;
        g.startPanY = g.panY;
        g.swT = Date.now(); 
        g.isSwiveLive = true; 
        DOM.swipeContainer.style.transition = 'none'; 
      }
    }

    function onGalleryTouchMove(e) {
      if (state.galleryViewMode === 'grid') return;

      const g = state.galleryGesture;
      if (g.isPinchActive && e.touches.length === 2) {
        const dist = getTouchDist(e.touches);
        const ratio = dist / g.startDist;
        const nextZoom = Math.max(1.0, Math.min(4.0, g.startZoom * ratio));
        
        if (nextZoom !== g.zoom) {
          const viewWidth = window.innerWidth;
          const viewHeight = window.innerHeight;
          const originX = viewWidth / 2;
          const originY = viewHeight / 2;

          const targetX = g.pinchCenterX - originX;
          const targetY = g.pinchCenterY - originY;

          let rawPanX = targetX - (targetX - g.startPanX) * (nextZoom / g.startZoom);
          let rawPanY = targetY - (targetY - g.startPanY) * (nextZoom / g.startZoom);

          g.zoom = nextZoom;

          const maxX = Math.max(0, (viewWidth * g.zoom - viewWidth) / 2);
          const maxY = Math.max(0, (viewHeight * g.zoom - viewHeight) / 2);

          g.panX = Math.max(-maxX, Math.min(maxX, rawPanX));
          g.panY = Math.max(-maxY, Math.min(maxY, rawPanY));

          if (g.zoom <= 1.0) {
            g.panX = 0;
            g.panY = 0;
          }
          updateCurrentImageTransform();
        }
        return;
      }

      if (!g.isSwiveLive || e.touches.length !== 1) return;
      
      if (g.zoom > 1.0) {
        let rawPanX = g.startPanX + (e.touches[0].clientX - g.swX);
        let rawPanY = g.startPanY + (e.touches[0].clientY - g.swY);

        const viewWidth = window.innerWidth;
        const viewHeight = window.innerHeight;
        const maxX = Math.max(0, (viewWidth * g.zoom - viewWidth) / 2);
        const maxY = Math.max(0, (viewHeight * g.zoom - viewHeight) / 2);

        g.panX = Math.max(-maxX, Math.min(maxX, rawPanX));
        g.panY = Math.max(-maxY, Math.min(maxY, rawPanY));

        updateCurrentImageTransform();
        return;
      }

      DOM.swipeContainer.style.transform = `translateX(${-state.currentSlideIndex * window.innerWidth + e.touches[0].clientX - g.swX}px)`;
    }

    function onGalleryTouchEnd(e) {
      if (state.galleryViewMode === 'grid') return;

      const g = state.galleryGesture;
      if (g.isPinchActive) {
        if (e.touches.length < 2) g.isPinchActive = false;
        return;
      }

      if (!g.isSwiveLive) return; 
      g.isSwiveLive = false;
      
      const dx = e.changedTouches[0].clientX - g.swX;
      const dy = e.changedTouches[0].clientY - g.swY;
      const dt = Date.now() - g.swT;
      const speed = Math.abs(dx) / Math.max(dt, 1);
      const viewWidth = window.innerWidth;
      
      if (Math.abs(dx) < 5 && Math.abs(dy) < 5 && dt < 250) {
        DOM.viewerHeader.classList.toggle('ui-hidden');
        return;
      }

      if (g.zoom > 1.0) return;
      
      if ((dx < -viewWidth * 0.3 || (dx < -20 && speed > 0.5)) && state.currentSlideIndex < state.photosArray.length - 1) {
        state.currentSlideIndex++;
        resetSlideZoom();
      } else if ((dx > viewWidth * 0.3 || (dx > 20 && speed > 0.5)) && state.currentSlideIndex > 0) {
        state.currentSlideIndex--;
        resetSlideZoom();
      }
      moveSlide(true);
    }

    DOM.galleryViewer.addEventListener('touchstart', onGalleryTouchStart, { passive: true });
    DOM.galleryViewer.addEventListener('touchmove', onGalleryTouchMove, { passive: true });
    DOM.galleryViewer.addEventListener('touchend', onGalleryTouchEnd, { passive: true });

    // ── Permission Setup ──
    function showPermScreen(msg) {
      DOM.permScreen.style.display = 'flex';
      DOM.topBar.style.display = 'none';
      DOM.bottomBar.style.display = 'none';
      if (msg) DOM.permDesc.textContent = msg;
    }

    function handleCameraError(err) {
      const errorMessages = { 
        NotAllowedError: '카메라 권한이 거부되었습니다.\n브라우저 설정에서 카메라 접근을 허용해 주세요.', 
        NotFoundError: '사용 가능한 카메라를 찾을 수 없습니다.', 
        NotReadableError: '카메라가 다른 앱에서 사용 중입니다.' 
      };
      showPermScreen(errorMessages[err.name] || '카메라를 열 수 없습니다.');
    }

    DOM.openBtn.addEventListener('click', () => startCamera(state.facingMode, false));

    // ── Toast System ──
    function showToast(msg, duration = 1800) {
      clearTimeout(state.toastTimer);
      DOM.toast.textContent = msg; 
      DOM.toast.classList.add('show');
      state.toastTimer = setTimeout(() => DOM.toast.classList.remove('show'), duration);
    }

    // ── Background Lifecycle Recovery ──
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        setTimeout(checkAndResumeCamera, 200);
      }
    });

    // ── 시스템 통합 진입점 초기화 ──
    async function initApp() {
      try {
        await initDB();
        
        const savedPhotos = await loadPhotosFromDB();
        if (savedPhotos && savedPhotos.length > 0) {
          state.photosArray = savedPhotos;
          DOM.thumbnailImg.src = savedPhotos[savedPhotos.length - 1].objectUrl;
          DOM.thumbnailImg.style.display = 'block';
        }
      } catch (err) {
        console.error('초기화 트랙 예외 발생:', err);
      } finally {
        startCamera(state.facingMode, true);
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initApp);
    } else {
      initApp();
    }
  </script>
</body>
</html>
