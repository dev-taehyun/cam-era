<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>Camera</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-user-select: none;
      -moz-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      touch-action: none;
      overscroll-behavior: none;
    }

    /* ── Viewfinder ── */
    #viewfinder {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      pointer-events: none;
    }

    /* ── Canvas (hidden) ── */
    #canvas { display: none; }

    /* ── Permission Screen ── */
    #permission-screen {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 90;
      gap: 0;
    }

    .perm-icon {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }

    .perm-title {
      color: #fff;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.3px;
      margin-bottom: 10px;
    }

    .perm-desc {
      color: rgba(255,255,255,0.45);
      font-size: 14px;
      text-align: center;
      line-height: 1.55;
      padding: 0 40px;
      margin-bottom: 36px;
    }

    #open-camera-btn {
      background: #fff;
      color: #000;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.2px;
      padding: 15px 48px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    #open-camera-btn:active { opacity: 0.75; }

    /* ── Top Bar ── */
    #top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      padding: env(safe-area-inset-top, 0px) 20px 0;
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 30;
      padding-bottom: 8px;
    }

    /* ── Zoom Bar ── */
    #zoom-bar {
      position: fixed;
      bottom: 170px;
      left: 0;
      right: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 25;
      pointer-events: none;
    }

    #zoom-pill {
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(0,0,0,0.48);
      backdrop-filter: blur(16px) saturate(1.4);
      -webkit-backdrop-filter: blur(16px) saturate(1.4);
      border-radius: 100px;
      padding: 6px 8px;
      pointer-events: all;
    }

    .zoom-btn {
      background: transparent;
      border: none;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: -0.1px;
      padding: 4px 10px;
      border-radius: 100px;
      cursor: pointer;
      min-width: 44px;
      text-align: center;
      transition: background 0.15s, color 0.15s;
      pointer-events: all;
    }
    .zoom-btn.active {
      background: rgba(255,255,255,0.22);
      color: #FFD60A;
      font-weight: 600;
    }
    .zoom-btn:active {
      background: rgba(255,255,255,0.15);
    }

    /* ── Bottom Bar ── */
    #bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0 32px calc(env(safe-area-inset-bottom, 0px) + 32px);
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0;
      z-index: 30;
      background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 100%);
    }

    /* Save toggle — sits just above shutter row */
    #save-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      pointer-events: all;
    }

    #save-label {
      color: rgba(255,255,255,0.75);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    /* iOS-style toggle */
    #save-toggle {
      position: relative;
      width: 46px;
      height: 28px;
      cursor: pointer;
      pointer-events: all;
    }
    #save-toggle input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }
    .t-track {
      position: absolute;
      inset: 0;
      border-radius: 100px;
      background: rgba(255,255,255,0.18);
      transition: background 0.22s ease;
    }
    #save-toggle input:checked + .t-track { background: #34C759; }
    .t-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    #save-toggle input:checked ~ .t-thumb { transform: translateX(18px); }

    /* Main control row: thumbnail / shutter / flip */
    #control-row {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* Thumbnail */
    #thumbnail-slot {
      width: 52px;
      height: 52px;
      border-radius: 10px;
      border: 2.5px solid rgba(255,255,255,0.65);
      overflow: hidden;
      background: rgba(255,255,255,0.06);
      cursor: pointer;
      pointer-events: all;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    #thumbnail-slot:active { opacity: 0.7; }
    #thumbnail-slot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    /* Shutter */
    #shutter {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: transparent;
      border: 3.5px solid rgba(255,255,255,0.9);
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      transition: transform 0.1s ease;
      pointer-events: all;
    }
    #shutter::after {
      content: '';
      position: absolute;
      inset: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.95);
      transition: transform 0.1s ease, opacity 0.1s ease;
    }
    #shutter:active { transform: scale(0.91); }
    #shutter:active::after { transform: scale(0.86); opacity: 0.8; }

    /* Flip */
    #flip-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: all;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    #flip-btn:active { background: rgba(255,255,255,0.22); }
    #flip-btn.spinning { transform: rotate(180deg); }

    /* ── Gallery viewer ── */
    #gallery-viewer {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 100;
      display: none;
    }

    #viewer-header {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 72px;
      padding: env(safe-area-inset-top, 0px) 20px 0;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding-bottom: 12px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent);
      z-index: 110;
    }

    .viewer-btn {
      width: 36px;
      height: 36px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s;
    }
    .viewer-btn:active { opacity: 0.6; }

    #viewer-counter {
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    }

    #swipe-container {
      display: flex;
      width: 100%;
      height: 100%;
      will-change: transform;
    }
    .swipe-slide {
      min-width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .swipe-slide img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      pointer-events: none;
      display: block;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(30,30,30,0.85);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      color: #fff;
      padding: 11px 22px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.01em;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Error overlay ── */
    #error-msg {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(255,255,255,0.65);
      font-size: 14px;
      text-align: center;
      padding: 0 40px;
      z-index: 95;
      display: none;
      line-height: 1.65;
    }

    /* Prevent pull-to-refresh / rubber band */
    body { overscroll-behavior-y: contain; }
  </style>
</head>
<body>

  <video id="viewfinder" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <!-- Permission screen -->
  <div id="permission-screen">
    <div class="perm-icon">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
    </div>
    <div class="perm-title">카메라 접근</div>
    <div class="perm-desc">사진을 촬영하려면 카메라 접근 권한이 필요합니다.</div>
    <button id="open-camera-btn">카메라 열기</button>
  </div>

  <!-- Top bar -->
  <div id="top-bar"></div>

  <!-- Zoom bar -->
  <div id="zoom-bar">
    <div id="zoom-pill"></div>
  </div>

  <!-- Bottom bar -->
  <div id="bottom-bar">
    <div id="save-row">
      <span id="save-label">사진 저장</span>
      <label id="save-toggle" for="save-cb">
        <input type="checkbox" id="save-cb">
        <span class="t-track"></span>
        <span class="t-thumb"></span>
      </label>
    </div>
    <div id="control-row">
      <div id="thumbnail-slot">
        <img id="thumbnail" alt="">
      </div>
      <button id="shutter" aria-label="촬영"></button>
      <button id="flip-btn" aria-label="카메라 전환">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 4v6h6"/><path d="M23 20v-6h-6"/>
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10"/>
          <path d="M3.51 15a9 9 0 0 0 14.85 3.36L23 14"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Gallery viewer -->
  <div id="gallery-viewer">
    <div id="viewer-header">
      <button class="viewer-btn" id="viewer-close" aria-label="닫기">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <div id="viewer-counter">1 / 1</div>
      <button class="viewer-btn" id="viewer-download" aria-label="다운로드">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </button>
    </div>
    <div id="swipe-container"></div>
  </div>

  <div id="toast"></div>
  <div id="error-msg"></div>

  <script>
    'use strict';

    /* ── DOM refs ── */
    const viewfinder      = document.getElementById('viewfinder');
    const canvas          = document.getElementById('canvas');
    const permScreen      = document.getElementById('permission-screen');
    const openBtn         = document.getElementById('open-camera-btn');
    const topBar          = document.getElementById('top-bar');
    const zoomBar         = document.getElementById('zoom-bar');
    const zoomPill        = document.getElementById('zoom-pill');
    const bottomBar       = document.getElementById('bottom-bar');
    const shutter         = document.getElementById('shutter');
    const flipBtn         = document.getElementById('flip-btn');
    const thumbnailEl     = document.getElementById('thumbnail');
    const saveCheckbox    = document.getElementById('save-cb');
    const galleryViewer   = document.getElementById('gallery-viewer');
    const swipeContainer  = document.getElementById('swipe-container');
    const viewerClose     = document.getElementById('viewer-close');
    const viewerDownload  = document.getElementById('viewer-download');
    const viewerCounter   = document.getElementById('viewer-counter');
    const toastEl         = document.getElementById('toast');

    /* ── State ── */
    let currentStream     = null;
    let facingMode        = 'environment';
    let photosArray       = [];
    let currentSlideIndex = 0;
    let toastTimer        = null;

    /* Zoom state */
    let availableZoomLevels = [];  // e.g. [0.5, 1, 2]
    let currentZoomIndex    = 0;
    let zoomTrack           = null; // the actual video track

    /* ─────────────────────────────────────────
       GLOBAL GESTURE BLOCK
       Prevent: scroll, pinch-zoom, text select,
       context menu, double-tap zoom
    ───────────────────────────────────────── */
    document.addEventListener('touchstart',  e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
    document.addEventListener('touchmove',   e => e.preventDefault(), { passive: false });
    document.addEventListener('gesturestart',e => e.preventDefault(), { passive: false });
    document.addEventListener('gesturechange',e=> e.preventDefault(), { passive: false });
    document.addEventListener('gestureend',  e => e.preventDefault(), { passive: false });
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('selectstart', e => e.preventDefault());
    document.addEventListener('dragstart',   e => e.preventDefault());

    /* Prevent double-tap zoom */
    let lastTap = 0;
    document.addEventListener('touchend', e => {
      const now = Date.now();
      if (now - lastTap < 300) e.preventDefault();
      lastTap = now;
    }, { passive: false });

    /* ─────────────────────────────────────────
       PERMISSION CHECK ON LOAD
       Query permission state first; if already
       granted, skip the request UI entirely.
    ───────────────────────────────────────── */
    async function initOnLoad() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showPermScreen('이 브라우저는 카메라를 지원하지 않습니다.');
        return;
      }

      // Permissions API supported?
      if (navigator.permissions && navigator.permissions.query) {
        try {
          const result = await navigator.permissions.query({ name: 'camera' });
          if (result.state === 'granted') {
            await startCamera(facingMode);
            return;
          }
        } catch (_) {
          // Permissions API not supported for camera on this UA — fall through
        }
      }

      // Not granted or unknown: show permission screen
      showPermScreen();
    }

    window.addEventListener('load', initOnLoad);

    /* ─────────────────────────────────────────
       CAMERA
    ───────────────────────────────────────── */
    async function startCamera(facing) {
      if (currentStream) {
        currentStream.getTracks().forEach(t => t.stop());
        currentStream = null;
      }

      facingMode = facing;

      // Max quality constraints
      const constraints = {
        audio: false,
        video: {
          facingMode: facing,
          width:  { ideal: 9999 },
          height: { ideal: 9999 },
          frameRate: { ideal: 60 }
        }
      };

      try {
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        currentStream = stream;
        viewfinder.srcObject = stream;

        zoomTrack = stream.getVideoTracks()[0];

        // Show UI
        permScreen.style.display  = 'none';
        topBar.style.display      = 'flex';
        bottomBar.style.display   = 'flex';

        await buildZoomControls();

      } catch (err) {
        handleCameraError(err);
      }
    }

    /* Recover stream if it dies */
    function checkAndResumeCamera() {
      if (galleryViewer.style.display === 'block') return;
      if (permScreen.style.display !== 'none') return;

      const track = currentStream ? currentStream.getVideoTracks()[0] : null;
      if (!track || track.readyState === 'ended' || viewfinder.paused) {
        startCamera(facingMode);
      }
    }

    /* ─────────────────────────────────────────
       ZOOM — read real device optical levels
    ───────────────────────────────────────── */
    async function buildZoomControls() {
      zoomPill.innerHTML = '';
      availableZoomLevels = [];
      zoomBar.style.display = 'none';

      if (!zoomTrack) return;

      const caps = zoomTrack.getCapabilities ? zoomTrack.getCapabilities() : {};

      /* Build candidate zoom levels from device capabilities */
      let levels = [];

      // Android / some browsers expose camera.zoom range
      if (caps.zoom && caps.zoom.min != null && caps.zoom.max != null) {
        const min = caps.zoom.min;
        const max = caps.zoom.max;

        // Typical telephoto steps: 0.5 (ultra), 1 (wide), 2, 3, 5
        const candidates = [0.5, 1, 2, 3, 5];
        candidates.forEach(v => {
          if (v >= min && v <= max) levels.push(v);
        });
        if (levels.length === 0) levels = [min, 1, max].filter((v, i, a) => a.indexOf(v) === i);

        // Clamp: at most 5 buttons
        if (levels.length > 5) levels = levels.slice(0, 5);

        levels.forEach((z, i) => {
          const btn = document.createElement('button');
          btn.className = 'zoom-btn' + (i === 0 ? ' active' : '');
          btn.textContent = formatZoom(z);
          btn.addEventListener('click', () => applyZoom(z, btn));
          zoomPill.appendChild(btn);
        });

        availableZoomLevels = levels;
        currentZoomIndex = 0;
        zoomBar.style.display = 'flex';

        // Apply default (1× if available, else first)
        const defaultIdx = levels.indexOf(1) !== -1 ? levels.indexOf(1) : 0;
        const defaultBtn = zoomPill.querySelectorAll('.zoom-btn')[defaultIdx];
        if (defaultBtn) applyZoom(levels[defaultIdx], defaultBtn);

      } else {
        // Zoom API not available — hide bar silently
        zoomBar.style.display = 'none';
      }
    }

    function formatZoom(z) {
      if (z === Math.floor(z)) return `${z}×`;
      return `${z}×`;
    }

    async function applyZoom(level, btnEl) {
      // Update button states
      zoomPill.querySelectorAll('.zoom-btn').forEach(b => b.classList.remove('active'));
      if (btnEl) btnEl.classList.add('active');

      if (!zoomTrack || !zoomTrack.applyConstraints) return;
      try {
        await zoomTrack.applyConstraints({ advanced: [{ zoom: level }] });
      } catch (_) { /* Zoom not settable on this device */ }
    }

    /* ─────────────────────────────────────────
       SHUTTER — capture at native resolution
    ───────────────────────────────────────── */
    shutter.addEventListener('click', () => {
      if (!currentStream) return;

      const vw = viewfinder.videoWidth;
      const vh = viewfinder.videoHeight;
      if (!vw || !vh) return;

      canvas.width  = vw;
      canvas.height = vh;
      const ctx = canvas.getContext('2d');

      if (facingMode === 'user') {
        ctx.translate(vw, 0);
        ctx.scale(-1, 1);
      }
      ctx.drawImage(viewfinder, 0, 0, vw, vh);

      // Quality 1.0 = maximum JPEG
      const dataUrl = canvas.toDataURL('image/jpeg', 1.0);

      photosArray.push(dataUrl);

      thumbnailEl.src = dataUrl;
      thumbnailEl.style.display = 'block';

      if (saveCheckbox.checked) {
        saveImage(dataUrl, false);
      }
    });

    /* ─────────────────────────────────────────
       SAVE
    ───────────────────────────────────────── */
    function pad(n) { return String(n).padStart(2, '0'); }
    function formatDatetime() {
      const d = new Date();
      return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
    }

    function saveImage(dataUrl, toast = true) {
      const a = document.createElement('a');
      a.href = dataUrl;
      a.download = `photo_${formatDatetime()}.jpg`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      if (toast) showToast('저장되었습니다');
      setTimeout(checkAndResumeCamera, 300);
    }

    /* ─────────────────────────────────────────
       FLIP
    ───────────────────────────────────────── */
    flipBtn.addEventListener('click', () => {
      flipBtn.classList.add('spinning');
      setTimeout(() => flipBtn.classList.remove('spinning'), 350);
      startCamera(facingMode === 'environment' ? 'user' : 'environment');
    });

    /* ─────────────────────────────────────────
       GALLERY VIEWER
    ───────────────────────────────────────── */
    document.getElementById('thumbnail-slot').addEventListener('click', () => {
      if (photosArray.length === 0) return;

      swipeContainer.innerHTML = '';
      photosArray.forEach(src => {
        const slide = document.createElement('div');
        slide.className = 'swipe-slide';
        const img = document.createElement('img');
        img.src = src;
        slide.appendChild(img);
        swipeContainer.appendChild(slide);
      });

      currentSlideIndex = photosArray.length - 1;
      galleryViewer.style.display = 'block';
      setTimeout(() => moveSlide(false), 30);
    });

    viewerClose.addEventListener('click', () => {
      galleryViewer.style.display = 'none';
      setTimeout(checkAndResumeCamera, 100);
    });

    viewerDownload.addEventListener('click', () => {
      if (photosArray[currentSlideIndex]) saveImage(photosArray[currentSlideIndex], true);
    });

    function moveSlide(animate = true) {
      swipeContainer.style.transition = animate
        ? 'transform 0.3s cubic-bezier(0.16, 1, 0.3, 1)'
        : 'none';
      swipeContainer.style.transform = `translateX(${-currentSlideIndex * window.innerWidth}px)`;
      viewerCounter.textContent = `${currentSlideIndex + 1} / ${photosArray.length}`;
    }

    /* Swipe gesture for gallery */
    let swipeStartX = 0, swipeStartTime = 0, swipeLive = false;

    galleryViewer.addEventListener('touchstart', e => {
      if (e.touches.length === 1) {
        swipeStartX    = e.touches[0].clientX;
        swipeStartTime = Date.now();
        swipeLive      = true;
        swipeContainer.style.transition = 'none';
      }
      e.stopPropagation();
    }, { passive: true });

    galleryViewer.addEventListener('touchmove', e => {
      if (!swipeLive || e.touches.length !== 1) return;
      const dx = e.touches[0].clientX - swipeStartX;
      const base = -currentSlideIndex * window.innerWidth;
      swipeContainer.style.transform = `translateX(${base + dx}px)`;
      e.stopPropagation();
    }, { passive: true });

    galleryViewer.addEventListener('touchend', e => {
      if (!swipeLive) return;
      swipeLive = false;
      const dx    = e.changedTouches[0].clientX - swipeStartX;
      const speed = Math.abs(dx) / Math.max(Date.now() - swipeStartTime, 1);
      const threshold = window.innerWidth * 0.3;

      if ((dx < -threshold || (dx < -20 && speed > 0.5)) && currentSlideIndex < photosArray.length - 1) {
        currentSlideIndex++;
      } else if ((dx > threshold || (dx > 20 && speed > 0.5)) && currentSlideIndex > 0) {
        currentSlideIndex--;
      }
      moveSlide(true);
      e.stopPropagation();
    }, { passive: true });

    /* ─────────────────────────────────────────
       PERMISSION SCREEN HELPER
    ───────────────────────────────────────── */
    function showPermScreen(msg) {
      permScreen.style.display  = 'flex';
      topBar.style.display      = 'none';
      bottomBar.style.display   = 'none';
      zoomBar.style.display     = 'none';
      if (msg) {
        document.querySelector('.perm-desc').textContent = msg;
      }
    }

    function handleCameraError(err) {
      let desc = '카메라를 열 수 없습니다.';
      if (err.name === 'NotAllowedError')  desc = '카메라 권한이 거부되었습니다.\n브라우저 설정에서 카메라 접근을 허용해 주세요.';
      if (err.name === 'NotFoundError')    desc = '사용 가능한 카메라를 찾을 수 없습니다.';
      if (err.name === 'NotReadableError') desc = '카메라가 다른 앱에서 사용 중입니다.';
      showPermScreen(desc);
    }

    openBtn.addEventListener('click', () => startCamera(facingMode));

    /* ─────────────────────────────────────────
       TOAST
    ───────────────────────────────────────── */
    function showToast(msg, ms = 1800) {
      clearTimeout(toastTimer);
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), ms);
    }

    /* ─────────────────────────────────────────
       BACKGROUND / VISIBILITY RECOVERY
    ───────────────────────────────────────── */
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        setTimeout(checkAndResumeCamera, 200);
      }
    });
  </script>
</body>
</html>
