<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>Gesture Camera</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { 
      width: 100%; 
      height: 100%; 
      background: #000; 
      overflow: hidden; 
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      -webkit-tap-highlight-color: transparent;
      touch-action: none; 
    }

    #viewfinder { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
    #flash { position: fixed; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 10; transition: opacity 0.05s; }
    #flash.on { opacity: 1; }
    #canvas { display: none; }

    /* ── 지정해주신 카메라 권한 요청 화면 스타일 ── */
    #start-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      z-index: 50;
      gap: 16px;
    }
    #start-screen svg { opacity: 0.5; }
    #start-label {
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      letter-spacing: 0.08em;
      text-align: center;
      line-height: 1.6;
    }
    #open-camera-btn {
      margin-top: 8px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 100px;
      color: #fff;
      font-size: 14px;
      letter-spacing: 0.06em;
      padding: 12px 32px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: background 0.15s;
    }
    #open-camera-btn:hover { background: rgba(255,255,255,0.2); }

    /* ── 하단 컨트롤 레이아웃 ── */
    #bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding-bottom: calc(20px + env(safe-area-inset-bottom));
      display: none; /* 카메라 허용 전까지 숨김 */
      flex-direction: column;
      align-items: center;
      z-index: 20;
      background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.3) 60%, transparent 100%);
    }

    /* ── 인체공학 호(Arc)형 줌 컨트롤러 ── */
    #zoom-arc-wrapper {
      position: relative;
      width: 280px;
      height: 60px;
      display: none; 
      justify-content: center;
      align-items: flex-end;
      margin-bottom: 10px;
    }
    #zoom-badge {
      position: absolute;
      top: -10px;
      background: rgba(255, 255, 255, 0.9);
      color: #000;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      letter-spacing: 0.03em;
      pointer-events: none;
      z-index: 5;
    }
    #zoom-wheel-area {
      width: 100%;
      height: 40px;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(20px);
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #zoom-hidden-slider {
      position: absolute;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
      z-index: 3;
    }
    .wheel-ticks {
      display: flex;
      width: 90%;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
      opacity: 0.6;
      transition: transform 0.1s ease-out;
    }
    .tick { width: 2px; height: 8px; background: rgba(255,255,255,0.4); border-radius: 1px; }
    .tick.major { height: 16px; background: #fff; }
    .tick.center-dot { width: 6px; height: 6px; border-radius: 50%; background: #30d158; }

    /* ── 버튼 그룹 ── */
    #action-row {
      width: 100%;
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #shutter {
      width: 76px; height: 76px;
      border-radius: 50%;
      background: transparent;
      border: 4px solid #fff;
      cursor: pointer;
      position: relative;
    }
    #shutter::after {
      content: ''; position: absolute; inset: 4px;
      border-radius: 50%; background: #fff;
      transition: transform 0.1s;
    }
    #shutter:active::after { transform: scale(0.88); }

    #thumbnail-slot {
      width: 46px; height: 46px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.7);
      overflow: hidden; background: rgba(0,0,0,0.5); cursor: pointer;
    }
    #thumbnail-slot img { width: 100%; height: 100%; object-fit: cover; display: none; }

    #flip-btn {
      width: 46px; height: 46px; border-radius: 50%;
      background: rgba(255,255,255,0.15); border: none;
      display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px);
    }

    #save-toggle-wrap {
      display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
      background: rgba(0,0,0,0.5); padding: 4px 12px; border-radius: 20px;
    }
    #save-toggle-label { color: rgba(255,255,255,0.6); font-size: 12px; font-weight: 500; }
    #save-toggle-wrap.active #save-toggle-label { color: #fff; }
    #save-toggle { position: relative; width: 42px; height: 24px; }
    #save-toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track { position: absolute; inset: 0; border-radius: 100px; background: rgba(255,255,255,0.2); transition: background 0.2s; }
    #save-toggle input:checked + .toggle-track { background: #30d158; }
    .toggle-thumb { position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; border-radius: 50%; background: #fff; transition: transform 0.2s; }
    #save-toggle input:checked ~ .toggle-thumb { transform: translateX(18px); }

    /* ── 임시 갤러리 뷰어 (Full Overlay) ── */
    #gallery-viewer { position: fixed; inset: 0; background: #000; z-index: 100; display: none; user-select: none; }
    #viewer-header {
      position: absolute; top: 0; left: 0; right: 0; height: 70px; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent); z-index: 110;
    }
    #viewer-close, #viewer-download { background: transparent; border: none; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8)); }
    #viewer-counter { color: #fff; font-size: 16px; font-weight: 600; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
    #swipe-container { display: flex; width: 100%; height: 100%; will-change: transform; }
    .swipe-slide { min-width: 100%; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .swipe-slide img { max-width: 100%; max-height: 100%; object-fit: contain; pointer-events: none; }

    #toast {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.85); color: #fff; padding: 12px 28px; border-radius: 100px;
      font-size: 14px; font-weight: 500; z-index: 120; opacity: 0; pointer-events: none;
      transition: opacity 0.2s; backdrop-filter: blur(10px);
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

  <video id="viewfinder" autoplay playsinline muted></video>
  <div id="flash"></div>
  <canvas id="canvas"></canvas>

  <div id="start-screen">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </svg>
    <span id="start-label">카메라 접근 권한이 필요합니다</span>
    <button id="open-camera-btn">카메라 열기</button>
  </div>

  <div id="bottom-bar">
    <div id="save-toggle-wrap">
      <span id="save-toggle-label">자동 저장</span>
      <label id="save-toggle" for="save-checkbox">
        <input type="checkbox" id="save-checkbox">
        <span class="toggle-track"></span>
        <span class="toggle-thumb"></span>
      </label>
    </div>

    <div id="zoom-arc-wrapper">
      <div id="zoom-badge">1.0x</div>
      <div id="zoom-wheel-area">
        <input type="range" id="zoom-hidden-slider" min="1" max="5" step="0.1" value="1">
        <div class="wheel-ticks">
          <div class="tick major"></div>
          <div class="tick"></div>
          <div class="tick"></div>
          <div class="tick"></div>
          <div class="tick center-dot"></div>
          <div class="tick"></div>
          <div class="tick"></div>
          <div class="tick"></div>
          <div class="tick major"></div>
        </div>
      </div>
    </div>

    <div id="action-row">
      <div id="thumbnail-slot">
        <img id="thumbnail" alt="미리보기">
      </div>
      <button id="shutter" aria-label="촬영"></button>
      <button id="flip-btn" aria-label="전환">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <path d="M21.5 2v6h-6M2.5 22v-6h6M20 11.5A8.5 8.5 0 0 0 5.05 6.5L2.5 9m19 6l-2.55 2.5A8.5 8.5 0 0 1 4 12.5"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="gallery-viewer">
    <div id="viewer-header">
      <button id="viewer-close">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
      <div id="viewer-counter">0 / 0</div>
      <button id="viewer-download">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4M7 10l5 5 5-5M12 15V3"></path>
        </svg>
      </button>
    </div>
    <div id="swipe-container"></div>
  </div>

  <div id="toast"></div>

  <script>
    'use strict';

    const viewfinder = document.getElementById('viewfinder');
    const canvas = document.getElementById('canvas');
    const flash = document.getElementById('flash');
    const startScreen = document.getElementById('start-screen');
    const startLabel = document.getElementById('start-label');
    const openBtn = document.getElementById('open-camera-btn');
    const bottomBar = document.getElementById('bottom-bar');
    const shutter = document.getElementById('shutter');
    const flipBtn = document.getElementById('flip-btn');
    const thumbnailEl = document.getElementById('thumbnail');
    const saveCheckbox = document.getElementById('save-checkbox');
    const saveToggleWrap = document.getElementById('save-toggle-wrap');
    const toastEl = document.getElementById('toast');
    
    const zoomArcWrapper = document.getElementById('zoom-arc-wrapper');
    const zoomHiddenSlider = document.getElementById('zoom-hidden-slider');
    const zoomBadge = document.getElementById('zoom-badge');

    const galleryViewer = document.getElementById('gallery-viewer');
    const swipeContainer = document.getElementById('swipe-container');
    const viewerClose = document.getElementById('viewer-close');
    const viewerDownload = document.getElementById('viewer-download');
    const viewerCounter = document.getElementById('viewer-counter');

    let currentStream = null, videoTrack = null, facingMode = 'environment', toastTimer = null;
    let photosArray = [], currentSlideIndex = 0;

    // 브라우저 핀치 투 줌(확대/축소 제스처) 원천 차단 로직
    document.addEventListener('touchstart', (e) => {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });

    document.addEventListener('touchmove', (e) => {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });

    let lastTouchTime = 0;
    document.addEventListener('touchend', (e) => {
      const now = Date.now();
      if (now - lastTouchTime <= 300) e.preventDefault();
      lastTouchTime = now;
    }, { passive: false });

    saveCheckbox.addEventListener('change', () => saveToggleWrap.classList.toggle('active', saveCheckbox.checked));

    // ── 지정해주신 권한 매핑 방식 연동 카메라 기동 로직 ──
    openBtn.addEventListener('click', async () => {
      if (currentStream) currentStream.getTracks().forEach(t => t.stop());
      
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          audio: false, video: { facingMode: facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } }
        });
        
        currentStream = stream;
        viewfinder.srcObject = stream;
        videoTrack = stream.getVideoTracks()[0];
        
        startScreen.style.display = 'none';
        bottomBar.style.display = 'flex';
        
        setupZoomHardware();
      } catch (err) {
        if (err.name === 'NotAllowedError') {
          startLabel.innerHTML = '카메라 권한이 거부되었습니다.<br>브라우저 설정에서 카메라 접근을 허용해 주세요.';
        } else {
          startLabel.innerText = '카메라를 연결할 수 없습니다.';
        }
      }
    });

    async function changeCameraDirection(facing) {
      if (currentStream) currentStream.getTracks().forEach(t => t.stop());
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          audio: false, video: { facingMode: facing, width: { ideal: 1920 }, height: { ideal: 1080 } }
        });
        currentStream = stream;
        viewfinder.srcObject = stream;
        videoTrack = stream.getVideoTracks()[0];
        facingMode = facing;
        setupZoomHardware();
      } catch (e) {
        console.error("카메라 전환 실패", e);
      }
    }

    function setupZoomHardware() {
      if (!videoTrack) return;
      const capabilities = videoTrack.getCapabilities ? videoTrack.getCapabilities() : {};
      
      if ('zoom' in capabilities) {
        zoomArcWrapper.style.display = 'flex';
        zoomHiddenSlider.min = capabilities.zoom.min;
        zoomHiddenSlider.max = capabilities.zoom.max;
        zoomHiddenSlider.step = capabilities.zoom.step || 0.1;
        
        const settings = videoTrack.getSettings();
        const currentZoom = settings.zoom || capabilities.zoom.min;
        zoomHiddenSlider.value = currentZoom;
        updateZoomDisplay(parseFloat(currentZoom));
      } else {
        zoomArcWrapper.style.display = 'none';
      }
    }

    async function applyZoomHardware(val) {
      if (!videoTrack) return;
      const min = parseFloat(zoomHiddenSlider.min);
      const max = parseFloat(zoomHiddenSlider.max);
      if (val < min) val = min;
      if (val > max) val = max;

      try {
        await videoTrack.applyConstraints({ advanced: [{ zoom: val }] });
        zoomHiddenSlider.value = val;
        updateZoomDisplay(val);
      } catch (e) { console.error(e); }
    }

    function updateZoomDisplay(val) {
      zoomBadge.textContent = val.toFixed(1) + 'x';
      const percent = (val - zoomHiddenSlider.min) / (zoomHiddenSlider.max - zoomHiddenSlider.min);
      const moveX = (percent - 0.5) * -50; 
      document.querySelector('.wheel-ticks').style.transform = `translateX(${moveX}px)`;
    }

    zoomHiddenSlider.addEventListener('input', () => {
      applyZoomHardware(parseFloat(zoomHiddenSlider.value));
    });

    // ── 실제 카메라 스타일의 뷰파인더 멀티 터치 핀치 줌 ──
    let initTouchDist = 0;
    let initZoomVal = 1.0;

    function getTouchDistance(e) {
      return Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
    }

    viewfinder.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2 && videoTrack) {
        initTouchDist = getTouchDistance(e);
        initZoomVal = parseFloat(zoomHiddenSlider.value);
      }
    }, { passive: true });

    viewfinder.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2 && videoTrack && initTouchDist > 0) {
        e.preventDefault();
        const currentDist = getTouchDistance(e);
        const distRatio = currentDist / initTouchDist;
        applyZoomHardware(initZoomVal * distRatio);
      }
    }, { passive: false });

    viewfinder.addEventListener('touchend', (e) => {
      if (e.touches.length < 2) initTouchDist = 0;
    }, { passive: true });


    // ── 촬영 처리 ──
    shutter.addEventListener('click', () => {
      if (!currentStream) return;
      const vw = viewfinder.videoWidth, vh = viewfinder.videoHeight;
      canvas.width = vw; canvas.height = vh;
      const ctx = canvas.getContext('2d');

      if (facingMode === 'user') { ctx.translate(vw, 0); ctx.scale(-1, 1); }
      ctx.drawImage(viewfinder, 0, 0, vw, vh);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.95);

      flash.classList.add('on');
      setTimeout(() => flash.classList.remove('on'), 100);

      photosArray.push(dataUrl);
      if (saveCheckbox.checked) saveImageFile(dataUrl);
      
      thumbnailEl.src = dataUrl;
      thumbnailEl.style.display = 'block';
    });

    function saveImageFile(dataUrl) {
      fetch(dataUrl).then(res => res.blob()).then(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `IMG_${Date.now()}.jpg`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast('갤러리에 파일 저장 완료');
      });
    }

    flipBtn.addEventListener('click', () => {
      changeCameraDirection(facingMode === 'environment' ? 'user' : 'environment');
    });

    // ── 임시 갤러리 ──
    document.getElementById('thumbnail-slot').addEventListener('click', () => {
      if (photosArray.length === 0) return;
      swipeContainer.innerHTML = '';
      photosArray.forEach(src => {
        const slide = document.createElement('div'); slide.className = 'swipe-slide';
        const img = document.createElement('img'); img.src = src;
        slide.appendChild(img); swipeContainer.appendChild(slide);
      });
      currentSlideIndex = photosArray.length - 1;
      moveSlidePosition(false);
      galleryViewer.style.display = 'block';
    });

    viewerClose.addEventListener('click', () => galleryViewer.style.display = 'none');
    viewerDownload.addEventListener('click', () => {
      if (photosArray[currentSlideIndex]) saveImageFile(photosArray[currentSlideIndex]);
    });

    function moveSlidePosition(anim = true) {
      swipeContainer.style.transition = anim ? 'transform 0.3s cubic-bezier(0.16, 1, 0.3, 1)' : 'none';
      swipeContainer.style.transform = `translateX(${-currentSlideIndex * window.innerWidth}px)`;
      viewerCounter.textContent = `${currentSlideIndex + 1} / ${photosArray.length}`;
    }

    let startX = 0, isMoving = false, startTime = 0;

    galleryViewer.addEventListener('touchstart', (e) => {
      startX = e.touches[0].clientX;
      startTime = Date.now();
      isMoving = true;
      swipeContainer.style.transition = 'none';
    }, { passive: true });

    galleryViewer.addEventListener('touchmove', (e) => {
      if (!isMoving) return;
      const diffX = e.touches[0].clientX - startX;
      e.preventDefault(); 
      const base = -currentSlideIndex * window.innerWidth;
      swipeContainer.style.transform = `translateX(${base + diffX}px)`;
    }, { passive: false });

    galleryViewer.addEventListener('touchend', (e) => {
      if (!isMoving) return;
      isMoving = false;
      const diffX = e.changedTouches[0].clientX - startX;
      const speed = Math.abs(diffX) / (Date.now() - startTime);

      if ((diffX < -window.innerWidth * 0.35 || speed > 0.4) && currentSlideIndex < photosArray.length - 1) {
        currentSlideIndex++;
      } else if ((diffX > window.innerWidth * 0.35 || speed > 0.4) && currentSlideIndex > 0) {
        currentSlideIndex--;
      }
      moveSlidePosition(true);
    });

    function showToast(msg) {
      clearTimeout(toastTimer); toastEl.textContent = msg; toastEl.classList.add('show');
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1500);
    }

    document.addEventListener('contextmenu', e => e.preventDefault());
  </script>
</body>
</html>
